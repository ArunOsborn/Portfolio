<app-cookage-search-bar></app-cookage-search-bar>

<div id="recipe-results">
	<div class="recipes">
		@for (recipe of recipeService.loadedRecipes; track recipe;) {
			<article class="recipe-card">
				<a [routerLink]="'/apps/cookage/' + recipe.id">
					<h4>{{recipe.name}}</h4>
					<p>Time to cook: {{formatterService.formatMinutes(recipe.total_time)}}</p>
				</a>
			</article>
		}
	</div>
</div>
